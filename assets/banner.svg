<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#aa00ff"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Shield icon -->
  <polygon points="80,40 120,55 120,105 80,130 40,105 40,55" fill="url(#shield)" stroke="url(#accent)" stroke-width="2"/>
  <polyline points="60,80 75,95 100,70" stroke="#00e5ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="160" y="85" font-family="monospace" font-size="42" font-weight="bold" fill="#ffffff" letter-spacing="3">
    RedSeek Rescue
  </text>

  <!-- Subtitle -->
  <text x="160" y="125" font-family="monospace" font-size="18" fill="#8888aa" letter-spacing="2">
    AI-Powered System Rescue Tool
  </text>

  <!-- Version badge -->
  <rect x="160" y="145" width="120" height="26" rx="13" fill="#00e5ff" fill-opacity="0.15" stroke="#00e5ff" stroke-width="1"/>
  <text x="220" y="163" font-family="monospace" font-size="12" fill="#00e5ff" text-anchor="middle" font-weight="bold">v1.5.0</text>

  <!-- Status dots -->
  <circle cx="900" cy="55" r="4" fill="#00e5ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="915" y="60" font-family="monospace" font-size="12" fill="#8888aa">AI ONLINE</text>

  <circle cx="900" cy="80" r="4" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <text x="915" y="85" font-family="monospace" font-size="12" fill="#8888aa">SYSTEM READY</text>

  <circle cx="900" cy="105" r="4" fill="#ffaa00">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <text x="915" y="110" font-family="monospace" font-size="12" fill="#8888aa">OFFLINE MODE</text>

  <!-- Bottom accent line -->
  <rect x="0" y="195" width="1200" height="5" fill="url(#accent)" rx="2.5"/>
</svg>
